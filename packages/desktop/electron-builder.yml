# T-1701 · electron-builder packaging config (mac dmg + win nsis).
#
# The renderer is the SAME bundle the web build ships (packages/ui/dist-web). It is
# copied into the packaged app's resources via `extraResources`, and main.ts loads
# it from `process.resourcesPath/dist-web/index.html` when `app.isPackaged`.
#
# NOTE: real app icons (build/icon.icns / build/icon.ico) are a follow-up; without
# them electron-builder falls back to its default icon — packaging still succeeds.
appId: com.spacerquest.rimward
productName: Spacer Quest — Rimward
copyright: © Spacer Quest project
# npmRebuild MUST stay false in this npm-workspaces monorepo. With it true,
# electron-builder sees no local `packages/desktop/node_modules` (deps are hoisted to
# the repo root) and runs `npm install --production` here, which npm resolves as a
# workspace-wide prune that strips every devDependency from the shared root
# node_modules — deleting app-builder-bin (and electron-builder itself) mid-run and
# killing packaging with `spawn app-builder_<arch> ENOENT`. The main+preload are
# bundled by esbuild (see esbuild.mjs) into self-contained CJS with electron-updater
# inlined, so there are NO native deps to rebuild and nothing to install: the packaged
# app is entirely `dist/**` + the extraResources renderer.
npmRebuild: false
directories:
  output: release
  buildResources: build
# The app bundle itself: compiled main+preload + this package's manifest, PLUS the one
# native runtime dependency. The renderer ships as an extraResource (below), not inside
# the asar app tree.
#
# T-1702 · steamworks.js is a NATIVE prebuilt addon (`.node` binaries) that cannot be
# bundled into JS (see esbuild.mjs — it stays `external` and is `require`d at runtime).
# Because deps are HOISTED to the repo-root node_modules in this workspace, the app dir
# (packages/desktop) has no local node_modules for electron-builder to auto-collect from
# — so we map it EXPLICITLY from the hoisted root into the app's `node_modules/` inside
# the asar (`to: node_modules/steamworks.js`), which is exactly where the runtime
# `require('steamworks.js')` from `dist/main.js` resolves it. `asarUnpack` then extracts
# the whole module (its `.node` binary in particular) out of the asar onto the real
# filesystem, since a native addon cannot be `dlopen`ed from inside an asar. `npmRebuild`
# stays false — steamworks.js ships prebuilds, so there is nothing to rebuild (and the
# hoisted-workspace prune bug never fires).
files:
  - dist/**/*
  - package.json
  # steamworks.js is a PRODUCTION dependency of this package, so electron-builder's
  # dependency collector includes it automatically at `node_modules/steamworks.js`
  # (hoist-aware in v25 — it resolves the module wherever npm placed it in the
  # workspace). We deliberately do NOT also add an explicit `from: ../../node_modules`
  # mapping: that external file-set is copied independently of the auto-collected
  # node_modules and, when npm's layout puts steamworks.js somewhere the collector
  # also sees it (as in CI's clean `npm ci`), both target the same asar.unpacked path
  # and electron-builder dies with `EEXIST: file already exists, link ...`. One source
  # of truth = the prod dependency.
asarUnpack:
  - node_modules/steamworks.js/**
extraResources:
  - from: ../ui/dist-web
    to: dist-web
mac:
  target:
    - dmg
  category: public.app-category.games
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
