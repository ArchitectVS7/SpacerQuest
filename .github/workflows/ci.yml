name: CI

on:
  push:
    branches: [main, rimward-redesign]
  pull_request:

# One CI run per branch tip: a new push cancels the superseded run for the
# same branch/PR — a commit that is no longer the tip answers no question.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, lint, test
    # Same-repo PRs are already tested by the push-triggered run of the same
    # commit; running both is pure duplication. Fork PRs produce no push run
    # here, so they still get tested.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    # Hard backstop against a true hang (not slowness) burning the 6-hour
    # default. The legitimate suite runs real multi-hundred-day Monte-Carlo sim
    # campaigns and clocks ~14 min today, so 15 gave almost no headroom and any
    # added test tipped it into a false cancel. 30 keeps ~2x room while still
    # tripping fast on an actual hang. If this climbs again, split the heavy sim
    # tests into their own parallel job rather than raising this further.
    timeout-minutes: 30
    # T-1701 · This web job only TYPECHECKS the Electron main/preload (via `tsc -b`),
    # so it needs electron's types but NOT its ~150MB platform binary — skip the
    # binary download to keep the web jobs fast. The desktop job (which launches the
    # real app) omits this and downloads the binary.
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & build
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

  e2e:
    name: Playwright e2e
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        run: npx tsc -b

      # Cache the downloaded chromium binary (~/.cache/ms-playwright on ubuntu
      # runners). package-lock.json pins @playwright/test, so its hash changes
      # exactly when the browser build Playwright wants can change.
      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: packages/ui

      # System deps aren't covered by the cache — install just those on a hit.
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: packages/ui

      - name: Run e2e
        run: npm run test:e2e
        working-directory: packages/ui

      # T-1602 run-report artifact (screens visited, days elapsed, per-test run
      # reports bundled in the HTML report). `if: always()` uploads it on failure
      # too — it is the primary diagnostic for a flaky e2e run.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            packages/ui/playwright-report
            packages/ui/test-results
          retention-days: 14

  # T-1701 · Electron shell proof. Runs on macOS (the acceptance names "runs on
  # macOS") in its own job so the heavy `electron` binary never slows the web jobs.
  # It builds the renderer + the Electron main, then launches the REAL Electron app
  # (`_electron`) and plays Tour One through the cockpit DOM, asserting saves land in
  # the OS app-data dir and that a localStorage career migrates in. Electron ships its
  # own Chromium, so no `playwright install` is needed for the `_electron` path.
  desktop:
    name: Electron shell (macOS)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & build (incl. Electron main/preload)
        run: npx tsc -b

      - name: Build renderer bundle
        run: npm run build -w @spacerquest/ui

      # Produce a REAL packaged app (unsigned --dir, no dmg/signing cost). This MUST
      # pass — no continue-on-error — so a broken electron-builder config or a
      # packaging regression fails the job HERE. Its output (release/<arch>/…app) is
      # what the packaged-build e2e below launches, so this step is what proves a
      # packaged Spacer Quest build is actually produced, and the e2e then proves it
      # boots and runs Tour One.
      - name: Package desktop app (unsigned --dir)
        run: npm run package:dir -w @spacerquest/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # Runs BOTH the unpackaged-shell specs (electron-shell.spec.ts: app-data save
      # location + localStorage migration) AND the packaged-build spec
      # (electron-packaged.spec.ts), which launches the .app from the step above with
      # app.isPackaged === true and plays Tour One through the packaged renderer.
      - name: Run Electron shell e2e
        run: SQ_ELECTRON=1 npx playwright test --project=electron
        working-directory: packages/ui

      - name: Upload Electron report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: electron-report
          path: |
            packages/ui/playwright-report
            packages/ui/test-results
          retention-days: 14

  # T-1703 · Demo build proof. Runs on macOS (needs the electron binary to package and
  # `ditto` for the compressed-size check). It (1) runs the SQ_DEMO Playwright project,
  # whose webServer serves the REAL VITE_SQ_DEMO=1 build, proving the gate + day wall via
  # `demo-gate.spec.ts`; then (2) packages the demo app unsigned (--dir) and (3) asserts
  # the compressed distributable is < 200MB. The demo-save-carry spec runs in the DEFAULT
  # chromium project (the `e2e` job above), so full-side save import is proven there.
  demo:
    name: Demo build (macOS)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & build (incl. Electron main/preload)
        run: npx tsc -b

      - name: Cache Playwright browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: packages/ui

      # Prove the gate through the REAL demo build (the webServer builds VITE_SQ_DEMO=1).
      - name: Run demo gate e2e
        run: SQ_DEMO=1 npx playwright test --project=demo
        working-directory: packages/ui

      # Package the demo app unsigned (--dir), then assert the compressed size is sane.
      - name: Package demo app (unsigned --dir)
        run: npm run package:demo:dir -w @spacerquest/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Check demo build size (< 200MB compressed)
        run: node scripts/check-build-size.mjs

      - name: Upload demo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-report
          path: |
            packages/ui/playwright-report
            packages/ui/test-results
          retention-days: 14

  # T-1705 · Windows packaging proof. T-1701 shipped package:win and the mac desktop
  # job proves the packaged .app on macOS, but no CI had ever exercised the Windows
  # target — where the large majority of Steam players are. This job packages BOTH the
  # full and demo configs unsigned (--dir) on windows-latest and launches the packaged
  # win-unpacked EXE via Playwright _electron for a cockpit smoke (boot, dawn roll,
  # sign, end day), asserting saves land in the Windows userData dir and that the
  # steamworks.js win-x64 prebuild survived packaging (the T-1702 file-map + asarUnpack
  # path, whose EEXIST class regressed once). The ditto-based compressed-size gate stays
  # macOS-only by design (see the demo job); a Windows demo-size assertion is WAIVED here
  # — the mac demo job already proves the <200MB compressed bar. This job packages the
  # demo config on Windows purely to prove it BUILDS (the EEXIST class again), not its size.
  desktop-win:
    name: Windows packaging (windows-latest)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & build (incl. Electron main/preload)
        run: npx tsc -b

      - name: Build renderer bundle
        run: npm run build -w @spacerquest/ui

      # Package the FULL build unsigned (--dir) → release/win-unpacked/*.exe. Must pass —
      # no continue-on-error — so a packaging regression fails the job HERE.
      - name: Package desktop app (unsigned --dir)
        run: npm run package:dir -w @spacerquest/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # Package the DEMO build unsigned (--dir) → release-demo/win-unpacked/*.exe. Proves
      # the T-1703 demo config packages cleanly on Windows (the EEXIST class again).
      - name: Package demo app (unsigned --dir)
        run: npm run package:demo:dir -w @spacerquest/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # Launch ONLY the Windows packaged-exe spec (`--grep "@win"`) — the other electron
      # specs use unix-only pgrep teardown and either self-skip or are out of scope on
      # Windows. `shell: bash` is REQUIRED: windows-latest defaults to PowerShell, where
      # the bash-style inline env `SQ_ELECTRON=1 npx ...` does not parse; GitHub's Windows
      # runners ship Git-bash, keeping this command byte-identical to the mac desktop job.
      - name: Run Windows packaged-exe smoke
        run: SQ_ELECTRON=1 npx playwright test --project=electron --grep "@win"
        working-directory: packages/ui
        shell: bash

      - name: Upload Windows desktop report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-win-report
          path: |
            packages/ui/playwright-report
            packages/ui/test-results
          retention-days: 14
