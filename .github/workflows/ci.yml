name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit + Browser Playtest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: spacerquest-web

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: spacerquest
          POSTGRES_USER: spacerquest
          POSTGRES_PASSWORD: spacerquest
        # Map to 5454 to match .env / docker-compose.yml.
        ports:
          - 5454:5432
        options: >-
          --health-cmd "pg_isready -U spacerquest"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: 'true'
      NODE_ENV: test
      PORT: '3000'
      HOST: '0.0.0.0'
      DATABASE_URL: postgresql://spacerquest:spacerquest@localhost:5454/spacerquest
      REDIS_URL: redis://localhost:6380
      JWT_SECRET: ci-test-secret
      VITE_WS_URL: ws://localhost:3000
      # Mock OAuth endpoints (dev-login path only needs these present).
      BBS_PORTAL_CLIENT_ID: dev-client-id
      BBS_PORTAL_CLIENT_SECRET: dev-client-secret
      BBS_PORTAL_AUTH_URL: http://localhost:3000/auth/mock
      BBS_PORTAL_TOKEN_URL: http://localhost:3000/auth/mock/token
      BBS_PORTAL_CALLBACK_URL: http://localhost:3000/auth/callback
      BBS_PORTAL_USERINFO_URL: http://localhost:3000/auth/mock/userinfo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: spacerquest-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply database schema
        run: npm run db:push

      - name: Seed database
        run: npm run db:seed

      - name: Unit tests (vitest)
        run: npm test

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      # Fast fail-first check: the auth → main-menu boot handshake, run 5×.
      - name: Boot smoke (5×)
        run: npm run test:e2e:smoke

      # Deterministic browser gate: the scripted engine drives the real UI over
      # 50 turns. The LLM harness (agent.spec.ts) is intentionally NOT run in CI —
      # it needs a model and self-skips when none is available.
      - name: Browser playtest (scripted engine)
        run: npm run test:e2e:playtest

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: spacerquest-web/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
