name: CI

on:
  push:
    branches: [main, rimward-redesign]
  pull_request:

jobs:
  ci:
    name: Build, lint, test
    runs-on: ubuntu-latest
    # Hard backstop: the sim suite runs real multi-hundred-day campaigns, so a
    # hang (not slowness) should fail fast rather than burn the 6-hour default.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & build
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        run: npx tsc -b

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: packages/ui

      - name: Run e2e
        run: npm run test:e2e
        working-directory: packages/ui
