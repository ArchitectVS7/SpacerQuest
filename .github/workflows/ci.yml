name: CI

on:
  push:
    branches: [main, rimward-redesign]
  pull_request:

# One CI run per branch tip: a new push cancels the superseded run for the
# same branch/PR — a commit that is no longer the tip answers no question.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, lint, test
    # Same-repo PRs are already tested by the push-triggered run of the same
    # commit; running both is pure duplication. Fork PRs produce no push run
    # here, so they still get tested.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    # Hard backstop: the sim suite runs real multi-hundred-day campaigns, so a
    # hang (not slowness) should fail fast rather than burn the 6-hour default.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & build
        run: npx tsc -b

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

  e2e:
    name: Playwright e2e
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        run: npx tsc -b

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: packages/ui

      - name: Run e2e
        run: npm run test:e2e
        working-directory: packages/ui
