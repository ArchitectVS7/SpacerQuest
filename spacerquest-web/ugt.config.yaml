project:
  name: "SpacerQuest"
  version: "4.0"

engine:
  type: "simulation"
  # FAST MODE: API-direct bridge (no Playwright). ~50x faster for training.
  # Switch to "npx tsx tests/e2e/ugt-bridge.ts" for full UI validation (Phase 5).
  entry: "npx tsx tests/e2e/ugt-bridge-fast.ts"
  step_delay_ms: 0

# ── Observation Space ─────────────────────────────────────────────────────────
# Phase 3: Streamlined observations focused on decision-relevant state.
observation_space:
  type: "box"
  shape: 10
  mappings:
    - path: "credits"
      min: 0
      max: 100       # credits / 10000 (normalized in bridge)
    - path: "fuel"
      min: 0
      max: 1000
    - path: "hullCondition"
      min: 0
      max: 20
    - path: "cargoPods"
      min: 0
      max: 50
    - path: "maxCargoPods"
      min: 0
      max: 100
    - path: "upgrade_power"
      min: 0
      max: 2000
    - path: "growth_factor"
      min: 0
      max: 1
    - path: "total_trades"
      min: 0
      max: 500
    - path: "total_upgrades"
      min: 0
      max: 200
    - path: "turns_alive"
      min: 0
      max: 200

# ── Action Space ──────────────────────────────────────────────────────────────
# Phase 3: Consolidated from 9 → 7 actions.
#   - "trade" = atomic get-cargo → launch → arrive → deliver sequence
#   - "upgrade-ship" = upgrade weakest component (combines browse + buy)
#   - Removed individual get-cargo and deliver-cargo (too hard to discover as pair)
action_space:
  type: "discrete"
  size: 7
  actions:
    0: { name: "trade" }
    1: { name: "buy-fuel" }
    2: { name: "upgrade-ship" }
    3: { name: "repair" }
    4: { name: "visit-pub" }
    5: { name: "sell-fuel" }
    6: { name: "visit-bank" }

# ── Reward Profiles ───────────────────────────────────────────────────────────
#
# Phase 3 "growth" profile changes from Phase 2:
#   - loss_penalty reduced from 100 → 10 (was drowning out all other signals)
#   - survival bonus gated on progress (total_trades > 0)
#   - idle_penalty added for safe no-op sequences
#   - trade_profit has higher weight since trade is now atomic

reward_profiles:
  baseline:
    formula: "state.credits * 0.001"
    win_bonus: 0
    loss_penalty: 0

  growth:
    # All terms in -10 to +10 range:
    #   1. trade_profit × growth_factor × 3  → strong reward for successful delivery (gated by upgrades)
    #   2. fuel_safety × 0.2                 → -10 to +3 for fuel mgmt (only on success)
    #   3. upgrade_delta × 5                 → +5 per upgrade point
    #   4. -pub_penalty                      → -10 for pub spam
    #   5. -idle_penalty                     → -1 for safe no-op sequences
    #   6. -failed_trade                     → -0.5 per wasted trade attempt
    #   7. -0.1 per step (time pressure)     → standing still costs money
    formula: "(state.trade_profit * state.growth_factor * 3) + (state.fuel_safety * 0.2) + (state.upgrade_delta * 5) - state.pub_penalty - state.idle_penalty - state.failed_trade - 0.1"
    win_bonus: 50
    loss_penalty: 10

training:
  algorithm: "PPO"
  total_timesteps: 50000
  parallel_envs: 1
